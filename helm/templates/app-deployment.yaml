apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: app
        image: project-practicum-app:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: my-app-config
        - secretRef:
            name: my-app-secret
        resources:
          limits:
            memory: "2Gi"
          requests:
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /api/rooms
            port: 8080
          initialDelaySeconds: 90
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/rooms
            port: 8080
          initialDelaySeconds: 120
          periodSeconds: 5
        command: [ "java" ]
        args: [ "-jar", "/app/app.jar" ]